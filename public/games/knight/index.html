<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Knight Kingdom Slot — GameGacor</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,shrink-to-fit=yes">
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
</head>
<body>
  <div id="gg-topbar">
    <button id="gg-back" type="button" title="Kembali ke Lobby">← LOBBY</button>
    <div id="gg-title">⚔️ KNIGHT KINGDOM SLOT</div>
    <div id="gg-online-game" title="Pemain online"><span class="gg-dot"></span><span id="gg-online-game-num">—</span>&nbsp;main</div>
    <div id="gg-balance">💰 <span id="gg-balance-val">—</span></div>
    <div id="gg-user"><span id="gg-user-val">Guest</span></div>
  </div>

  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width=1280 height=720 tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
    </div>
    <div id="unity-warning"></div>
    <div id="unity-footer">
      <div id="unity-fullscreen-button"></div>
    </div>
  </div>

  <script>
    // ============================================================
    // GameGacor lobby session bootstrap (runs BEFORE Unity loads)
    // ============================================================
    (function () {
      var token = '';
      var user = '';
      try {
        // Lobby stores token under 'calavera_lobby_token' (the canonical key);
        // mirror it to 'calavera_token' so the Unity bridge (which reads the legacy key) sees it too.
        token = localStorage.getItem('calavera_lobby_token') || localStorage.getItem('calavera_token') || '';
        if (token && !localStorage.getItem('calavera_token')) {
          localStorage.setItem('calavera_token', token);
        }
        user = localStorage.getItem('calavera_user') || '';
      } catch (e) {}

      document.getElementById('gg-user-val').textContent = user || 'Guest';

      // Hook back button
      document.getElementById('gg-back').addEventListener('click', function () {
        window.location.href = '/lobby';
      });

      // Pull current balance from /api/me on load so the top bar shows live amount
      // before Unity finishes its own sync.
      function refreshBalance() {
        if (!token) return;
        fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            if (d && d.user && typeof d.user.balance === 'number') {
              document.getElementById('gg-balance-val').textContent = d.user.balance.toLocaleString('id-ID');
              window.__ggBalance = d.user.balance;
            }
          })
          .catch(function () {});
      }
      refreshBalance();
      // Refresh every 5s — picks up changes made by Unity's RecordSpin (server-side).
      setInterval(refreshBalance, 5000);
      // Also refresh when tab regains focus (covers idle players).
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) refreshBalance();
      });

      if (!token) {
        // No session — back to lobby login.
        var warn = document.getElementById('unity-warning');
        if (warn) {
          warn.style.display = 'block';
          warn.textContent = 'Belum login. Mengarahkan ke lobby…';
        }
        setTimeout(function () { window.location.href = '/lobby'; }, 1200);
      }
    })();
  </script>

  <script src="Build/knight.loader.js"></script>
  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() { warningBanner.style.display = warningBanner.children.length ? 'block' : 'none'; }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else { if (type == 'warning') div.style = 'background: yellow; padding: 10px;'; setTimeout(function () { warningBanner.removeChild(div); updateBannerVisibility(); }, 5000); }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var config = {
      dataUrl: buildUrl + "/knight.data.unityweb",
      frameworkUrl: buildUrl + "/knight.framework.js.unityweb",
      codeUrl: buildUrl + "/knight.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Coloknet",
      productName: "KnightKingdomSlot",
      productVersion: "1.0",
      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "960px";
      canvas.style.height = "600px";
    }

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = "Build/knight.loader.js";
    script.onload = function () {
      createUnityInstance(canvas, config, function (progress) {
        progressBarFull.style.width = 100 * progress + "%";
      }).then(function (unityInstance) {
        loadingBar.style.display = "none";
        fullscreenButton.onclick = function () { unityInstance.SetFullscreen(1); };
      }).catch(function (message) { alert(message); });
    };
    document.body.appendChild(script);
  </script>

  <style>
    #gg-online-game{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;color:#36d96b;}
    #gg-online-game .gg-dot{width:8px;height:8px;border-radius:50%;background:#36d96b;box-shadow:0 0 8px #36d96b;animation:ggpulse 1.5s infinite;}
    @keyframes ggpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.8)}}
  </style>
  <script>
    (function(){
      var _manual = 0;
      function targetOnline(){
        if (_manual > 0){ var span = Math.max(3, Math.round(_manual * 0.02)); return _manual + (Math.floor(Math.random()*(span*2+1)) - span); }
        var h = new Date().getHours();
        var wave = Math.sin((h - 4) / 24 * Math.PI * 2);
        return 190 + Math.round((wave + 1) / 2 * 190 * 0.9) + (Math.floor(Math.random()*40) - 14);
      }
      var el = document.getElementById('gg-online-game-num');
      var wrap = document.getElementById('gg-online-game');
      function startCounter(){
        var cur = targetOnline();
        function render(n){ if (el) el.textContent = Math.max(1, Math.round(n)).toLocaleString('id-ID'); }
        render(cur);
        setInterval(function(){
          var tgt = targetOnline();
          var diff = tgt - cur;
          var step = (diff === 0 ? 0 : (diff > 0 ? 1 : -1)) * Math.min(Math.abs(diff), 3 + Math.floor(Math.random()*10));
          cur += step + (Math.floor(Math.random()*9) - 4);
          render(cur);
        }, 3200);
      }
      fetch('/api/lobby-config').then(function(r){ return r.json(); }).then(function(cfg){
        cfg = cfg || {};
        var g = (cfg.gamePlayers && cfg.gamePlayers.knight) || {};
        if (g.enabled === false) { if (wrap) wrap.style.display = 'none'; return; }
        _manual = g.count || 0; startCounter();
      }).catch(function(){ startCounter(); });
    })();
  </script>
</body>
</html>
